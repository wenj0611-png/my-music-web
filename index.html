<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LE SSERAFIM BOX</title>
    <style>
        :root { --primary: #fe2c55; --bg: #000000; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-bottom: 40px; font-weight: 900; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 500px; }
        .card { background: #111; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #222; transition: 0.2s; }
        .card:active { transform: scale(0.95); background: #222; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .card p { margin: 5px 0; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        /* 播放器 */
        .player { position: fixed; bottom: 30px; left: 20px; right: 20px; background: #fff; padding: 15px 20px; border-radius: 40px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; }
        .info { color: #000; font-size: 12px; font-weight: bold; margin-bottom: 5px; text-align: center; }
        audio { width: 100%; height: 35px; }
    </style>
</head>
<body>

    <h1>LE SSERAFIM</h1>

    <div class="grid">
        <div class="card" onclick="play('EASY.mp3', 'EASY')">
            <img src="EASY.jpeg">
            <p>EASY</p>
        </div>

        <div class="card" onclick="play('CRAZY.mp3', 'CRAZY')">
            <img src="CRAZY.jpeg">
            <p>CRAZY</p>
        </div>

        <div class="card" onclick="play('HOT.mp3', 'HOT')">
            <img src="HOT.jpeg">
            <p>HOT</p>
        </div>
    </div>

    <div class="player" id="player-bar">
        <div class="info">NOW PLAYING: <span id="song-title"></span></div>
        <audio id="main-audio" controls></audio>
    </div>

    <script>
        const audio = document.getElementById('main-audio');
        const bar = document.getElementById('player-bar');
        const title = document.getElementById('song-title');

        function play(file, name) {
            title.innerText = name;
            audio.src = file;
            bar.style.display = 'block';
            audio.play().catch(err => {
                alert("播放失败，请确保文件名大写完全一致！");
            });
        }
    </script>
</body>
</html>
