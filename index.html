<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LE SSERAFIM BOX</title>
    <style>
        :root { --primary: #fe2c55; --bg: #000000; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-bottom: 30px; font-weight: 900; letter-spacing: 2px; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 500px; margin-bottom: 100px; }
        .card { background: #111; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #222; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .card:active { transform: scale(0.95); background: #222; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; margin-bottom: 10px; pointer-events: none; }
        .card p { margin: 5px 0; font-weight: bold; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

        /* 播放器容器 */
        .player { position: fixed; bottom: 30px; left: 15px; right: 15px; background: #ffffff; padding: 15px 20px; border-radius: 40px; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.8); z-index: 1000; }
        .info { color: #000; font-size: 12px; font-weight: bold; margin-bottom: 8px; text-align: center; }
        audio { width: 100%; height: 40px; }
    </style>
</head>
<body>

    <h1>LE SSERAFIM</h1>

    <div class="grid">
        <div class="card" onclick="playSong('CRAZY.mp3', 'CRAZY')">
            <img src="CRAZY.jpeg">
            <p>CRAZY</p>
        </div>

        <div class="card" onclick="playSong('EASY.mp3', 'EASY')">
            <img src="EASY.jpeg">
            <p>EASY</p>
        </div>

        <div class="card" onclick="playSong('HOT.mp3', 'HOT')">
            <img src="HOT.jpeg">
            <p>HOT</p>
        </div>

        <div class="card" onclick="playSong('perfectnight.mp3', 'PERFECT NIGHT')">
            <img src="perfectnight.jpeg">
            <p>PERFECT NIGHT</p>
        </div>
    </div>

    <div class="player" id="player-bar">
        <div class="info">NOW PLAYING: <span id="song-title" style="color:#fe2c55"></span></div>
        <audio id="main-audio" controls preload="auto"></audio>
    </div>

    <script>
        const audio = document.getElementById('main-audio');
        const bar = document.getElementById('player-bar');
        const title = document.getElementById('song-title');

        function playSong(file, name) {
            bar.style.display = 'block';
            title.innerText = name;
            
            // 只有在切歌时才重新加载
            if (!audio.src.includes(file)) {
                audio.src = file;
                audio.load();
            }
            
            // 尝试播放
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    // 如果自动播放被拦截，用户点一下音频条的播放键即可
                    console.log("Waiting for user interaction");
                });
            }
        }
    </script>
</body>
</html>
