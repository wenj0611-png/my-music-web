<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LE SSERAFIM BOX</title>
    <style>
        :root { --primary: #ffffff; --bg: #000000; --card: #111111; --text: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-bottom: 40px; font-weight: 900; letter-spacing: 2px; }
        .song-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 500px; }
        .song-card { background: var(--card); padding: 10px; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #222; }
        .song-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; margin-bottom: 10px; }
        .song-card p { margin: 5px 0; font-weight: bold; font-size: 14px; }
        .player-fixed { position: fixed; bottom: 30px; left: 20px; right: 20px; background: white; padding: 15px; border-radius: 40px; display: none; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .player-info { color: #000; font-size: 12px; font-weight: bold; margin-bottom: 5px; }
        audio { width: 100%; height: 30px; }
    </style>
</head>
<body>

    <h1>LE SSERAFIM</h1>

    <div class="song-grid">
        <div class="song-card" onclick="playSong('LE SSERAFIM (르세라핌) - CRAZY.mp3', 'CRAZY')">
            <img src="LE SSERAFIM (르세라핌) - CRAZY.jpeg" onerror="console.log('CRAZY图片加载失败')">
            <p>CRAZY</p>
        </div>

        <div class="song-card" onclick="playSong('LE SSERAFIM (르세라핌) - EASY.mp3', 'EASY')">
            <img src="LE SSERAFIM (르세라핌) - EASY.jpeg" onerror="console.log('EASY图片加载失败')">
            <p>EASY</p>
        </div>

        <div class="song-card" onclick="playSong('LE SSERAFIM (르세라핌) - HOT.mp3', 'HOT')">
            <img src="LE SSERAFIM (르세라핌) - HOT.jpeg" onerror="console.log('HOT图片加载失败')">
            <p>HOT</p>
        </div>
    </div>

    <div class="player-fixed" id="player-container">
        <div class="player-info">NOW PLAYING: <span id="cur-title"></span></div>
        <audio id="audio-player" controls></audio>
    </div>

    <script>
        const audio = document.getElementById('audio-player');
        const container = document.getElementById('player-container');
        const titleSpan = document.getElementById('cur-title');

        function playSong(file, name) {
            // 使用 encodeURI 处理文件名中的韩文和空格
            const encodedFile = encodeURI(file);
            titleSpan.innerText = name;
            audio.src = encodedFile;
            container.style.display = 'block';
            audio.play().catch(e => alert("播放失败，请确保文件名完全一致"));
        }
    </script>
</body>
</html>
