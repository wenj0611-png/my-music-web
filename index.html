<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LE SSERAFIM</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 40px 20px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; max-width: 500px; margin: 0 auto; }
        .card { background: #111; padding: 10px; border-radius: 10px; cursor: pointer; border: 1px solid #222; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 5px; }
        .player { position: fixed; bottom: 20px; left: 10px; right: 10px; background: #fff; padding: 15px; border-radius: 30px; display: none; color: #000; }
        audio { width: 100%; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>LE SSERAFIM</h1>
    <div class="grid">
        <div class="card" onclick="play('easy.mp3', 'EASY')">
            <img src="easy.jpeg">
            <p>EASY</p>
        </div>
        <div class="card" onclick="play('crazy.mp3', 'CRAZY')">
            <img src="crazy.jpeg">
            <p>CRAZY</p>
        </div>
        <div class="card" onclick="play('hot.mp3', 'HOT')">
            <img src="hot.jpeg">
            <p>HOT</p>
        </div>
    </div>
    <div class="player" id="p">
        <b id="t"></b>
        <audio id="a" controls></audio>
    </div>
    <script>
        function play(f, n) {
            const a = document.getElementById('a');
            document.getElementById('t').innerText = n;
            document.getElementById('p').style.display = 'block';
            a.src = f;
            a.play();
        }
    </script>
</body>
</html>
