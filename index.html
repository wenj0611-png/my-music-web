<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LE SSERAFIM BOX</title>
    <style>
        :root { --primary: #fe2c55; --bg: #000000; --text: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { margin-bottom: 40px; font-weight: 900; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 500px; }
        .card { background: #111; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; border: 1px solid #222; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .card p { margin: 5px 0; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        /* 播放器调整 */
        .player { position: fixed; bottom: 30px; left: 20px; right: 20px; background: #e0e0e0; padding: 15px 20px; border-radius: 40px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; }
        .info { color: #000; font-size: 12px; font-weight: bold; margin-bottom: 8px; text-align: center; }
        audio { width: 100%; height: 40px; }
    </style>
</head>
<body>

    <h1>LE SSERAFIM</h1>

    <div class="grid">
        <div class="card" onclick="playSong('EASY.mp3', 'EASY')">
            <img src="EASY.jpeg">
            <p>EASY</p>
        </div>
        <div class="card" onclick="playSong('CRAZY.mp3', 'CRAZY')">
            <img src="CRAZY.jpeg">
            <p>CRAZY</p>
        </div>
        <div class="card" onclick="playSong('HOT.mp3', 'HOT')">
            <img src="HOT.jpeg">
            <p>HOT</p>
        </div>
    </div>

    <div class="player" id="player-bar">
        <div class="info">NOW PLAYING: <span id="song-title"></span></div>
        <audio id="main-audio" controls preload="auto"></audio>
    </div>

    <script>
        const audio = document.getElementById('main-audio');
        const bar = document.getElementById('player-bar');
        const title = document.getElementById('song-title');

        function playSong(file, name) {
            // 1. 先显示播放条
            bar.style.display = 'block';
            title.innerText = name;
            
            // 2. 重新加载音频
            audio.src = file;
            audio.load(); // 强制加载新资源
            
            // 3. 尝试播放
            var playPromise = audio.play();

            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("播放被拦截，需要手动点击播放按钮");
                    // 这种情况通常是因为 iPad 的静音模式或权限，用户点一下音频条上的播放键即可
                });
            }
        }
    </script>
</body>
</html>
